<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <script src="/front/src/index.js" defer type="module"></script>
    <title>DiabeTest</title>
</head>

<body>
    <header>
        <h1><a href="index.html">DiabeTest</a></h1>
        <nav>
            <a href="./layouts/verDatos.html">Ver datos</a>
            <a href="./layouts/datosComidas.html">Datos comidas</a>
        </nav>
    </header>
    <main>
        <form class="form">
            <div class="agrupar-input">
                <label for="medicion">Medición</label>
                <input id="medicion" name="medicion" type="number" required>
            </div>
            <div class="comidas">
                <h2>
                    Comidas
                </h2>
                <div id="comidas">
                    <div class="comidaCantidad">
                        <div class="eliminarCaja">
                            <span data-name="delete-box">X</span>
                        </div>
                        <input type="text" data-name="comida" placeholder="comida" required>
                        <div class="input-wrapper">
                            <input type="text" data-name="cantidad" placeholder="cantidad" required>
                            <span class="suffix">gr</span>
                        </div>
                    </div>
                </div>
                <button class="agregarComida">Agregar comida</button>
            </div>
            <button type="submit" class="form-comidas">Cargar datos</button>
        </form>
    </main>
    <footer>
        <p>Desarrollado por Emiliano Becerra</p>
    </footer>
</body>

</html>
